title: "group-bracket — DESIGN.md item 11a grammar test"
# Mirrors group-bracket.html. The grammar version drives the same animation
# through gesture-interpreter.js: three icons placed staggered, then an
# ANNOTATE with array target draws a top bracket spanning all three with a
# label.

scenes:
  - id: scene-1
    duration: 3.5
    overlays:
      - gesture: PLACE
        element: icon-1
        delay: 0.2
        duration: 0.5
        easing: power2.out

      - gesture: PLACE
        element: icon-2
        delay: 0.5
        duration: 0.5
        easing: power2.out

      - gesture: PLACE
        element: icon-3
        delay: 0.8
        duration: 0.5
        easing: power2.out

      # Group-bracket: array target + (default) kind: bracket.
      # Bbox is computed from the three icons' data-tx / data-ty + their
      # CSS-resolved width/height. Default side: top.
      - gesture: ANNOTATE
        target: [icon-1, icon-2, icon-3]
        label: "Tier 2 — closed"
        delay: 1.5
        duration: 0.7
        easing: power2.out
